<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Sketch Booth Frame</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section id="startScreen" class="panel start">
      <h1>Sketch Booth Frame</h1>
      <p>사용자 사진은 서버로 올라가지 않고 이 브라우저 안에서만 처리됩니다.</p>
      <button id="startBtn" class="primary">시작하기</button>
    </section>

    <section id="setupScreen" class="panel hidden">
      <h2>프레임 설정</h2>
      <label>프레임 크기
        <select id="sizePreset">
          <option value="1080x1920">1080 × 1920 세로</option>
          <option value="1080x1350">1080 × 1350</option>
          <option value="1920x1080">1920 × 1080 가로</option>
          <option value="custom">직접 입력</option>
        </select>
      </label>
      <div class="grid2" id="customSizeBox">
        <label>가로 <input id="canvasW" type="number" value="1080" min="300"></label>
        <label>세로 <input id="canvasH" type="number" value="1920" min="300"></label>
      </div>
      <label>프레임 PNG 올리기 <input id="frameInput" type="file" accept="image/png,image/*"></label>
      <p class="hint">프레임 PNG는 캐릭터와 배경은 불투명하게, 네가 들어갈 칸만 투명하게 만들어야 합니다.</p>
      <button id="toSlotsBtn" class="primary">다음</button>
    </section>

    <section id="slotScreen" class="panel hidden">
      <h2>사진 칸 맞추기</h2>
      <p class="hint">노란 칸이 네 사진이 들어갈 자리입니다. 프레임의 투명 칸과 맞춰 주세요.</p>
      <div class="stageWrap"><div id="slotPreview" class="stage"></div></div>
      <div id="slotControls" class="slotControls"></div>
      <button id="toShootBtn" class="primary">촬영/업로드로 이동</button>
    </section>

    <section id="shootScreen" class="panel hidden">
      <div class="topbar">
        <button id="backToSlotsBtn" class="ghost">칸 수정</button>
        <span id="shotLabel">1컷</span>
      </div>
      <div class="stageWrap"><div id="liveStage" class="stage"></div></div>
      <div class="actions">
        <button id="cameraModeBtn" class="secondary">카메라로 찍기</button>
        <button id="uploadModeBtn" class="secondary">사진 업로드</button>
      </div>
      <div id="cameraControls" class="actions hidden">
        <button id="startCameraBtn" class="primary">카메라 켜기</button>
        <button id="autoShootBtn" class="primary">1컷부터 자동 촬영</button>
        <button id="captureOneBtn" class="secondary">현재 컷만 찍기</button>
      </div>
      <div id="uploadControls" class="actions hidden">
        <input id="photoInput" type="file" accept="image/*" multiple>
        <button id="applyUploadBtn" class="primary">선택한 사진 넣기</button>
      </div>
      <div id="countdown" class="countdown hidden">3</div>
      <div class="thumbs" id="thumbs"></div>
      <button id="finishBtn" class="primary hidden">완성본 보기</button>
    </section>

    <section id="resultScreen" class="panel hidden">
      <h2>완성본</h2>
      <div class="resultBox"><img id="resultImg" alt="완성본"></div>
      <div class="actions">
        <button id="downloadBtn" class="primary">저장하기</button>
        <button id="retryBtn" class="secondary">다시 찍기</button>
        <button id="resetBtn" class="ghost">처음으로</button>
      </div>
    </section>
  </main>
  <canvas id="workCanvas" class="hidden"></canvas>
  <script src="script.js"></script>
</body>
</html>
